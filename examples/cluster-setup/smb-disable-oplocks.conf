; FastSense v4.0 -- Samba per-share oplock disable snippet
;
; Append to your /etc/samba/smb.conf or /usr/local/etc/smb.conf
; under the per-share section for the FastSense cluster directory.
;
; Per the SQLite team's "How to Corrupt an SQLite Database" guidance,
; oplocks MUST be disabled on directories hosting SQLite databases on
; SMB shares. FastSense's shared EventStore is a SQLite database.
;
; After editing smb.conf:
;   systemctl restart smbd nmbd     # systemd
;   service smbd restart            # SysV / non-systemd
;
; Verify the per-share settings are active:
;   testparm -s -v | grep -iE 'oplocks|share name'

[FastSenseShare]
    path = /srv/fastsense
    valid users = @fastsense-engineers
    writable = yes
    browseable = yes
    oplocks = no
    level2 oplocks = no
    kernel oplocks = no
    posix locking = yes
    ; (... your existing per-share settings such as create mask / force user / vfs objects ...)
