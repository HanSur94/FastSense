name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  lint:
    name: MATLAB Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MISS_HIT
        run: pip install miss_hit

      - name: Run style checker
        run: mh_style libs/ tests/ examples/

      - name: Run linter
        run: mh_lint libs/ tests/ examples/

  build-mex:
    name: Build MEX (Linux)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container: gnuoctave/octave:8.4.0
    steps:
      - uses: actions/checkout@v4

      - name: Cache MEX binaries
        id: cache-mex
        uses: actions/cache@v4
        with:
          path: |
            libs/FastPlot/private/*.mex
            libs/SensorThreshold/private/*.mex
            libs/FastPlot/mksqlite.mex
          key: mex-linux-${{ hashFiles('libs/FastPlot/private/mex_src/**', 'libs/FastPlot/build_mex.m') }}

      - name: Compile MEX files
        if: steps.cache-mex.outputs.cache-hit != 'true'
        run: octave --eval "setup();"

      - name: Upload MEX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mex-linux
          path: |
            libs/FastPlot/private/*.mex
            libs/SensorThreshold/private/*.mex
            libs/FastPlot/mksqlite.mex
          retention-days: 1

  octave:
    name: Octave Tests
    needs: build-mex
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container: gnuoctave/octave:8.4.0
    env:
      FASTPLOT_SKIP_BUILD: "1"
      FASTPLOT_RESULTS_FILE: /tmp/test-results.txt
    steps:
      - uses: actions/checkout@v4

      - name: Download MEX binaries
        uses: actions/download-artifact@v4
        with:
          name: mex-linux

      - name: Run tests
        run: |
          # Octave 8.x has a known crash during handle class cleanup
          # (break_closure_cycles: invalid object). Run tests and capture
          # the results file before any potential crash.
          xvfb-run octave --eval "
            cd('tests');
            r = run_all_tests();
            fid = fopen('/tmp/test-results.txt', 'w');
            fprintf(fid, '%d %d\n', r.passed, r.failed);
            fclose(fid);
            if r.failed > 0; exit(1); end
          " || true
          # Check results even if Octave crashed during cleanup
          if [ -f /tmp/test-results.txt ]; then
            read passed failed < /tmp/test-results.txt
            echo "Results: $passed passed, $failed failed"
            if [ "$failed" -gt 0 ]; then
              echo "::error::$failed test(s) failed"
              exit 1
            fi
            echo "All $passed tests passed (Octave may have crashed during cleanup — known bug)"
          else
            echo "::error::Octave crashed before completing tests"
            exit 1
          fi

  mex-build-macos:
    name: MEX Build (macOS)
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Octave
        run: brew install octave

      - name: Compile MEX files
        run: octave --eval "setup(); fprintf('All MEX files compiled successfully on %s\n', computer());"

  matlab:
    name: MATLAB Tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Run tests with coverage
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('scripts'); run_tests_with_coverage();"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: matlab
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
