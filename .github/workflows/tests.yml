name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  lint:
    name: MATLAB Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MISS_HIT
        run: pip install miss_hit

      - name: Run style checker
        run: mh_style libs/ tests/ examples/

      - name: Run linter
        run: mh_lint libs/ tests/ examples/

  octave:
    name: Octave Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Octave and Xvfb
        run: sudo apt-get update && sudo apt-get install -y octave octave-dev xvfb

      - name: Run tests
        run: |
          xvfb-run octave --eval "cd('tests'); r = run_all_tests(); if r.failed > 0; exit(1); end"

  matlab:
    name: MATLAB Tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: "cd('tests'); r = run_all_tests(); assert(r.failed == 0, 'Tests failed');"
