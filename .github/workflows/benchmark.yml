name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mex:
    name: Build MEX
    uses: ./.github/workflows/_build-mex-octave.yml
    with:
      artifact-name: mex-linux-bench

  benchmark:
    name: Performance Benchmark
    timeout-minutes: 60
    needs: build-mex
    runs-on: ubuntu-latest
    container: gnuoctave/octave:11.1.0
    env:
      FASTSENSE_SKIP_BUILD: "1"
      # Pin BLAS thread pools to single-threaded — eliminates contention with
      # neighboring tenants on shared GitHub runners. Trades absolute throughput
      # for reproducibility; benchmarks track relative regressions, not raw speed.
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Download MEX binaries
        uses: actions/download-artifact@v8
        with:
          name: mex-linux-bench

      - name: Run benchmark
        run: |
          xvfb-run octave --eval "addpath(pwd); install(); addpath('scripts'); run_ci_benchmark();"

      # Phase 1028 D-07: upload the raw benchmark-results.json so the
      # 1000-tag harness baseline can be captured without scraping logs.
      - name: Upload benchmark results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-tag-pipeline-1k-results
          path: benchmark-results.json
          retention-days: 30

      - name: Fix git ownership
        run: git config --global --add safe.directory /__w/FastSense/FastSense

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1.22.0
        with:
          name: FastSense Performance
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # alert-threshold: 200% — raised from 110% per Phase 1028 follow-up.
          # The FastSense rendering benches (Render/Downsample/Zoom at
          # 5M–100M points) have mean wall-times of 0.4–0.7 ms on shared
          # CI runners. JIT-cached incremental update paths produce
          # 2–6x variance run-over-run independent of any code change.
          # At 110%, every PR false-positive-alerts on these sub-ms
          # metrics. 200% is the smallest threshold that absorbs the
          # observed JIT variance while still catching real regressions
          # (which historically show as 5–10x slowdowns, not 2x).
          # See PR #114 (2026-05-19) for the false-positive evidence.
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@HanSur94'
