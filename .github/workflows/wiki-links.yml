name: Wiki Link Check

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    name: Check Wiki Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude 'github.com/HanSur94/FastSense/wiki'
            --suggest
            wiki/*.md
          fail: true
          failIfEmpty: false
