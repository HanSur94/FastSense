name: Example Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-mex:
    name: Build MEX
    runs-on: ubuntu-latest
    container: gnuoctave/octave:8.4.0
    steps:
      - uses: actions/checkout@v4

      - name: Cache MEX binaries
        id: cache-mex
        uses: actions/cache@v4
        with:
          path: |
            libs/FastPlot/private/*.mex
            libs/SensorThreshold/private/*.mex
          key: mex-linux-${{ hashFiles('libs/FastPlot/private/mex_src/**', 'libs/FastPlot/build_mex.m') }}

      - name: Compile MEX files
        if: steps.cache-mex.outputs.cache-hit != 'true'
        run: octave --eval "setup();"

      - name: Upload MEX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mex-linux-examples
          path: |
            libs/FastPlot/private/*.mex
            libs/SensorThreshold/private/*.mex
          retention-days: 1

  smoke-test:
    name: Example Smoke Tests
    needs: build-mex
    runs-on: ubuntu-latest
    container: gnuoctave/octave:8.4.0
    steps:
      - uses: actions/checkout@v4

      - name: Download MEX binaries
        uses: actions/download-artifact@v4
        with:
          name: mex-linux-examples

      - name: Run example smoke tests
        run: |
          xvfb-run octave --eval "
            addpath(pwd);
            addpath(fullfile(pwd, 'libs', 'FastPlot'));
            addpath(fullfile(pwd, 'libs', 'SensorThreshold'));
            addpath(fullfile(pwd, 'libs', 'EventDetection'));
            addpath(fullfile(pwd, 'libs', 'Dashboard'));
            addpath(fullfile(pwd, 'libs', 'WebBridge'));
            examples = {
              'example_basic',
              'example_multi',
              'example_datetime',
              'example_nan_gaps',
              'example_vibration',
              'example_ecg',
              'example_linked',
              'example_themes',
              'example_uneven_sampling',
              'example_alarm_bands'
            };
            failed = {};
            for i = 1:numel(examples)
              name = examples{i};
              fprintf('Running %s... ', name);
              try
                cd('examples');
                feval(name);
                close all force;
                cd('..');
                fprintf('OK\n');
              catch e
                cd('..');
                fprintf('FAILED: %s\n', e.message);
                failed{end+1} = sprintf('%s: %s', name, e.message);
                close all force;
              end
            end
            fprintf('\n=== %d/%d examples passed ===\n', numel(examples)-numel(failed), numel(examples));
            if ~isempty(failed)
              fprintf('\nFailed:\n');
              for i = 1:numel(failed)
                fprintf('  - %s\n', failed{i});
              end
              exit(1);
            end
          "
